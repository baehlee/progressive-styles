<!-- ════════════════════════════════════════════════════════════════════
     PROGRESSIVE REAL ESTATE GROUP — HOMEPAGE STOCK-MODULE LEGIBILITY PASS
     ────────────────────────────────────────────────────────────────────
     WHERE TO PASTE:  Lofty Page Editor → Home Page → Add Block →
                      Custom HTML / Code Block. Place ONCE, anywhere on the
                      page (a <style> block applies page-wide regardless of
                      position). If an older "overrides" block is already on
                      the page, REPLACE it with this one.

     WHAT IT IS:      CSS-only restyle of the four stock Lofty modules we can't
                      replace (IDX listings, valuation, lead form, blog). These
                      modules are hardwired to Lofty's feed/CRM — we can only
                      restyle them, not rebuild them. This pass fixes the
                      legibility problems on the live homepage:
                        · Listings: white price/beds/address washing out on
                          bright photos → add a navy scrim + cream text.
                        · "What's your home worth?": navy heading invisible on
                          the dark dusk photo → cream heading + shadow.
                        · "Get More Information": navy heading invisible on the
                          near-black photo, gray 12px consent text → cream
                          heading + readable consent + on-brand ember submit.
                        · "Real Estate Blogs": gray card + faint body → paper
                          card, navy title, larger slate body.

     ▶ WHY THE REAL CLASS NAMES MATTER (do not change these):
       Lofty's modules use `md-house`, `md-evaluation-banner`, `md-form`,
       `md-blog` (verified against the live DOM 2026-05-22). An earlier version
       of this file guessed selectors like [class*="trusted"] / [class*="get-
       info"] that match NOTHING on the live site — which is why these sections
       still looked like raw stock. These selectors are confirmed live.

     ▶ SCOPE: This is a HOMEPAGE block, so the rules only load on the home page.
       The same fixes likely help the standalone /evaluation, /listing, and
       /blog pages too — if so, promote these rules into the global hosted.css
       later (see notes-local.md). Kept homepage-scoped here to avoid surprises
       on pages with a different module layout.

     ▶ Brand palette used below:
       ink #0A1F3D · paper #FBF8F1 · canvas #F4EEE3 · ember #B86A3E
       ember-2 #D38A5C · text #1B1815 · mute #6E695F · rule #D9D1BE
     ════════════════════════════════════════════════════════════════════ -->

<style>
/* ═══ 1. LISTINGS (.md-house) ═══════════════════════════════════════════
   Price, beds/baths AND the address all render inside .body-mask, overlaid on
   the lower third of each listing photo. On bright photos they wash out. Add a
   navy gradient scrim behind them and set all overlay text to cream + shadow so
   it reads on any photo. (The "Listed by …" footer already has its own navy bg.) */
.md-house .body-mask{
  background:linear-gradient(to top,
    rgba(10,31,61,.88) 0%,
    rgba(10,31,61,.48) 60%,
    transparent 95%) !important;
  padding-top:46px !important;
}
.md-house .house-price,
.md-house .house-basic span,
.md-house .house-address a{
  color:#FBF8F1 !important;
  text-shadow:0 1px 6px rgba(10,31,61,.85) !important;
}
.md-house .house-address a:hover{ color:#D38A5C !important; }


/* ═══ 2. "WHAT'S YOUR HOME WORTH?" (.md-evaluation-banner) ═══════════════
   Heading + step labels are dark navy on a dark dusk photo → flip to cream with
   a shadow so they lift off the image. The "Powered by Lofty / copyright" links
   are navy on the same dark photo → lighten to readable cream. */
.md-evaluation-banner h2{
  color:#FBF8F1 !important;
  text-shadow:0 2px 18px rgba(10,31,61,.9),0 1px 3px rgba(0,0,0,.5) !important;
}
.md-evaluation-banner .step-desc{
  color:#FBF8F1 !important;
  text-shadow:0 1px 8px rgba(10,31,61,.7) !important;
}
.md-evaluation-banner .chime,
.md-evaluation-banner .chime a,
.md-evaluation-banner .reserved,
.md-evaluation-banner a.link{ color:rgba(251,248,241,.72) !important; }


/* ═══ 3. "GET MORE INFORMATION" lead form (.md-form) ════════════════════
   Worst offender: navy heading on a near-black photo (invisible) and 12px gray
   consent text. Cream heading + shadow, readable cream consent, ember privacy
   links, and recolor the off-brand bright-blue submit to ember. Inputs already
   theme to paper from the global CSS — reasserted here for safety. */
.md-form h2{
  color:#FBF8F1 !important;
  text-shadow:0 2px 18px rgba(0,0,0,.65) !important;
}
.md-form p{ color:rgba(251,248,241,.85) !important; }
.md-form .privacy-link{ color:#D38A5C !important; text-decoration:underline; }
.md-form .label-top{ color:#6E695F !important; }
.md-form input,
.md-form textarea{
  background:#FBF8F1 !important;
  border:1px solid #D9D1BE !important;
  color:#1B1815 !important;
}
.md-form button.submit,
.md-form .toast-btn2{
  background:#B86A3E !important;
  border-color:#B86A3E !important;
  color:#FBF8F1 !important;
}
.md-form button.submit:hover{ background:#D38A5C !important; }


/* ═══ 4. "REAL ESTATE BLOGS" (.md-blog) ═════════════════════════════════
   Warm the section to cream, make the card a solid paper surface (Lofty puts a
   gray inline bg on .text-content), lift the body copy to a readable size, and
   put the "View More" button in brand navy. */
.md-blog{ background:#F4EEE3 !important; }
.md-blog .text-content{ background:#FBF8F1 !important; }
.md-blog .blog-card-title{ color:#0A1F3D !important; }
.md-blog .blog-card-desc{
  color:#2F3954 !important;
  font-size:17px !important;
  line-height:1.6 !important;
}
.md-blog .blog-jump-btn{ background:#0A1F3D !important; color:#FBF8F1 !important; }
.md-blog .blog-jump-btn:hover{ background:#B86A3E !important; }
</style>
